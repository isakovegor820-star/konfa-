document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  function findBox() {

      if (/Каждый поток/.test(subs[i].textContent) && subs[i].children.length === 0) {
        var p = subs[i].parentElement;
        while (p) {
          var sib = p.nextElementSibling;
          if (sib && /TRACK/i.test(sib.textContent)) return sib;
          p = p.parentElement;
          if (p === document.body) break;
        }

<script>

  function tagCountdown() {
    if (window.__ptCdDone) return;
    var labels = [].slice.call(document.querySelectorAll("span,div")).filter(function (e) {
      if (e.children.length) return false;
      var t = e.textContent.trim().toLowerCase();
      return /^(дн(ей|я)?|час(ов|а)?|мин(ут[аы]?)?|сек(унд[аы]?)?)$/.test(t);
    });
    if (labels.length < 3) return;
    labels.forEach(function (l) {
      var labWrap = l.parentElement;
      var cell = labWrap && labWrap.parentElement;   // настоящая ячейка (номер + подпись)
      if (!cell) return;
      cell.classList.add("pt-cd-seg");
      var grid = cell.parentElement;                 // грид из 4 ячеек
      if (grid) {

    if (document.getElementById("pt-typo-style") || !document.head) return;
    var st = document.createElement("style");

    st.textContent = CSS;
    document.head.appendChild(st);
    console.log("[typo] глобальный фикс line-height подключён");
  }

  // Крупные числа (08 / 80+ / 1500+ / 90 …) — листовые элементы с большим шрифтом
  // и тесной высотой строки. Поднимаем им line-height точечно.
  function fixBigNumbers() {
    var els = document.querySelectorAll("div,span,p,strong,b");
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.dataset.ptTypo) continue;
      if (el.children.length) continue;
      var t = (el.textContent || "").trim();
      if (!t || t.length > 14) continue;

          el.style.paddingBottom = "0.08em";
          el.style.paddingTop = "0.04em";
        }
        el.dataset.ptTypo = "1";
      }
    }
  }

  function run() { injectCSS(); fixBigNumbers(); }

  var n = 0;
  var iv = setInterval(function () { n++; run(); if (n > 160) clearInterval(iv); }, 150);
  window.addEventListener("load", run);
  window.addEventListener("DOMContentLoaded", run);
  try {
    var mo = new MutationObserver(function () { run(); });
    if (document.body) mo.observe(document.body, { childList: true, subtree: true });

})();

<!-- ===== NO-BLINK ADD-ON ===== -->
<script>
/* ============================================================
   NO-BLINK / KILL-DOTS ADD-ON — полностью убирает мелкие
   статус-точки по всему сайту (магента/циан/зелёные «огоньки»)
   и гасит их анимации. Большой glow-шар героя (80px) не трогаем.
   Переживает пересборку: держит стиль последним + наблюдатель.
   ============================================================ */
(function () {
  if (window.__ptNoBlink) return;
  window.__ptNoBlink = true;

  var CSS =
    "@keyframes blink{0%,100%{opacity:1}}" +
    "@keyframes pulse-dot{0%,100%{opacity:1;transform:none}}" +
    "@keyframes pulse-soft{0%,100%{opacity:1;transform:none}}" +
    "@keyframes pulse-ring{0%,100%{opacity:0}}" +
    '[style*="background: rgb(255, 46, 154)"][style*="border-radius: 50%"],' +
    '[style*="background:#FF2E9A"][style*="border-radius: 50%"],' +
    '[style*="background: #FF2E9A"][style*="border-radius: 50%"]{display:none !important}';

  var ANIM = /blink|pulse-dot|pulse-soft|pulse-ring/;

  function ensureStyle() {
    if (!document.head) return;
    var s = document.getElementById("pt-noblink");
    if (!s) { s = document.createElement("style"); s.id = "pt-noblink"; s.textContent = CSS; }
    if (document.head.lastElementChild !== s) document.head.appendChild(s);
  }

  // мелкая статус-точка: лист, маленькая (<=16px), с одной из «мигающих» анимаций
  function isStatusDot(el) {
    if (el.children.length) return false;
    var cs = getComputedStyle(el);
    if (!ANIM.test(cs.animationName)) return false;
    var w = parseFloat(cs.width), h = parseFloat(cs.height);
    return w > 0 && h > 0 && w <= 16 && h <= 16;
  }

  function hideDots() {
    var els = document.querySelectorAll("span,div,i,b");
    for (var i = 0; i < els.length; i++) {
      var e = els[i];
      if (e.dataset.ptKd) continue;
      if (isStatusDot(e)) { e.style.setProperty("display", "none", "important"); e.dataset.ptKd = "1"; }
    }
  }

  function run() { ensureStyle(); hideDots(); }

  var n = 0, iv = setInterval(function () { n++; run(); if (n > 120) clearInterval(iv); }, 150);
  run();
  window.addEventListener("load", run);
  window.addEventListener("DOMContentLoaded", run);
  try {
    var mo = new MutationObserver(run);
    if (document.body) mo.observe(document.body, { childList: true, subtree: true });
    setTimeout(function () { mo.disconnect(); }, 30000);
  } catch (e) {}
})();

</script>

<!-- ===== REVEAL SAFETY ADD-ON ===== -->
<script>
/* ============================================================
   REVEAL SAFETY ADD-ON — чинит «невидимый контент».
   Reveal-блоки бандла (data-reveal*) проявляются CSS-переходом
   opacity 0→1, но dc-runtime пересобирает их посреди перехода →
   CSSTransition виснет в running на нулевом кадре и держит
   opacity:0 (перебивая даже инлайн !important).
   Решение: убираем переход у reveal-элементов (виснуть нечему),
   проявляем то, что в зоне видимости (data-revealed=true +
   гасим залипшие анимации). Ниже сгиба — скрыто до скролла.
   ============================================================ */
(function () {
  if (window.__ptReveal) return;
  window.__ptReveal = true;

  var SEL = "[data-reveal],[data-reveal-left],[data-reveal-scale]";
  var CSS = "[data-reveal],[data-reveal-left],[data-reveal-scale]{transition:none !important;}";

  function injectCSS() {
    if (!document.getElementById("pt-reveal-style") && document.head) {
      var s = document.createElement("style"); s.id = "pt-reveal-style"; s.textContent = CSS; document.head.appendChild(s);
    }
  }
  function vh() { return window.innerHeight || document.documentElement.clientHeight || 812; }
  function show(el) {
    el.setAttribute("data-revealed", "true");
    if (el.getAnimations) { try { el.getAnimations().forEach(function (a) { a.finish(); }); } catch (e) {} }
  }
  function tick() {
    injectCSS();
    var els = document.querySelectorAll(SEL);
    for (var i = 0; i < els.length; i++) {
      var el = els[i];
      if (el.getAttribute("data-revealed") === "true" && parseFloat(getComputedStyle(el).opacity) > 0.95) continue;
      var r = el.getBoundingClientRect();
      if (r.top < vh() * 0.95) show(el); // в зоне видимости или выше → проявить
    }
  }

  injectCSS(); tick();
  window.addEventListener("load", tick);
  window.addEventListener("scroll", tick, { passive: true, capture: true });
  window.addEventListener("resize", tick, { passive: true });
  var n = 0, iv = setInterval(function () { n++; tick(); if (n > 320) clearInterval(iv); }, 250);
  try {
    var mo = new MutationObserver(tick);
    if (document.body) mo.observe(document.body, { childList: true, subtree: true });
    setTimeout(function () { mo.disconnect(); }, 30000);
  } catch (e) {}
})();

</script>

<!-- ===== STARFIELD ADD-ON ===== -->
<script>
/* ============================================================
   STARFIELD ADD-ON — звёздный космический фон всего сайта
   вместо «клетчатого» грида. Canvas z-index:-1 за контентом
   (над тёмным body). Звёзды НЕ мигают — дрейф + параллакс
   (мышь и скролл). Туманность очень мягкая, чтобы не мешать
   тексту. Мобайл — меньше частиц; reduced-motion — статичный кадр.
   Монтаж в <html> + ретрай: переживает пересборку body dc-runtime.
   ============================================================ */
(function () {
  if (window.__ptStars) return;
  window.__ptStars = true;

  var reduce = false, small = false;
  try { reduce = matchMedia("(prefers-reduced-motion: reduce)").matches; } catch (e) {}
  try { var iw = window.innerWidth || 0; if (iw > 0 && iw <= 760) small = true; } catch (e) {}

  var CSS =
    "#pt-stars{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none;display:block;}" +
    /* тёмную базу держит <html>, body делаем прозрачным — иначе он закрывает canvas z:-1 */
    "html{background-color:#07080b !important;}" +
    "body{background-color:transparent !important;}" +
    /* главная full-page обёртка тоже непрозрачная — пробиваем, чтобы canvas был виден за контентом */
    'div[style*="min-height: 100vh"][style*="rgb(7, 8, 11)"]{background:transparent !important;}' +
    /* убрать клетчатый грид и скан-линии (оставляем нижнюю виньетку и cyan-свечения body) */
    'div[style*="229, 255, 0.04) 1px"]{background-image:none !important;}' +
    'div[style*="255, 255, 0.01)"]{background-image:none !important;}';

  function mountStyle() {
    if (!document.getElementById("pt-stars-style")) {
      var st = document.createElement("style"); st.id = "pt-stars-style"; st.textContent = CSS;
      document.documentElement.appendChild(st);
    }
  }

  var c, ctx, W = 1280, H = 800, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function size() {
    if (!c) return;
    W = window.innerWidth || document.documentElement.clientWidth || 1280;
    H = window.innerHeight || document.documentElement.clientHeight || 800;
    c.width = Math.max(1, Math.round(W * DPR)); c.height = Math.max(1, Math.round(H * DPR));
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (!running) drawFrame(performance.now()); // статичный кадр перерисовать
  }
  function ensureCanvas() {
    if (document.getElementById("pt-stars")) { if (!c) { c = document.getElementById("pt-stars"); ctx = c.getContext("2d"); size(); } return; }

  var rnd = mb(20260925);
  var N = small ? 70 : 160;
  var stars = [];
  for (var i = 0; i < N; i++) stars.push({ x: rnd(), y: rnd(), d: 0.2 + rnd() * 0.8, vx: (rnd() - 0.5) * 0.00006 });
  var blobs = [
    { x: .16, y: .22, r: .50, col: [0, 229, 255], ph: 0.0 },
    { x: .86, y: .38, r: .55, col: [255, 46, 154], ph: 2.2 },
    { x: .52, y: .82, r: .60, col: [0, 229, 255], ph: 4.1 }
  ];

  var mx = 0, my = 0, tmx = 0, tmy = 0, scroll = 0, tscroll = 0;
  if (!small) {
    window.addEventListener("mousemove", function (e) { tmx = (e.clientX / (W || 1) - 0.5); tmy = (e.clientY / (H || 1) - 0.5); }, { passive: true });
  }
  window.addEventListener("scroll", function (e) {
    var v = 0; try { var t = e.target; if (t && t.scrollTop != null) v = t.scrollTop; } catch (er) {}
    var w = window.scrollY || document.documentElement.scrollTop || 0;
    tscroll = Math.max(v, w);
  }, true);

  var running = !reduce;
  var t0 = performance.now();
  function drawFrame(now) {
    if (!ctx) return;
    var t = (now - t0) / 1000;
    mx += (tmx - mx) * 0.04; my += (tmy - my) * 0.04; scroll += (tscroll - scroll) * 0.08;
    ctx.clearRect(0, 0, W, H);
    // мягкая туманность
    ctx.globalCompositeOperation = "lighter";
    for (var i = 0; i < blobs.length; i++) {
      var bl = blobs[i];
      var br = 0.5 + 0.5 * Math.sin(t * 0.12 + bl.ph);
      var bx = (bl.x + Math.sin(t * 0.05 + bl.ph) * 0.05 + mx * 0.04 * (i % 2 ? 1 : -1)) * W;
      var by = (bl.y + Math.cos(t * 0.045 + bl.ph) * 0.04) * H + my * 0.03 * H - scroll * 0.02;
      var rr = bl.r * Math.max(W, H) * (0.8 + 0.25 * br);
      var a = 0.055 * (0.6 + 0.4 * br);
      var g = ctx.createRadialGradient(bx, by, 0, bx, by, rr);
      g.addColorStop(0, "rgba(" + bl.col[0] + "," + bl.col[1] + "," + bl.col[2] + "," + a + ")");
      g.addColorStop(1, "rgba(" + bl.col[0] + "," + bl.col[1] + "," + bl.col[2] + ",0)");
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(bx, by, rr, 0, 7); ctx.fill();

      var r = s.d * 1.4 + 0.2, a = 0.16 + s.d * 0.5;
      ctx.fillStyle = "rgba(220,236,255," + a + ")"; ctx.beginPath(); ctx.arc(px, py, r, 0, 7); ctx.fill();
    }

  mountStyle(); ensureCanvas();
  requestAnimationFrame(loop); // reduced-motion → running=false → один кадр
  var n = 0, iv = setInterval(function () { n++; mountStyle(); ensureCanvas(); if (n > 30) clearInterval(iv); }, 300);
})();

</script>

  function vp2(d) {
    return '<div class="pt-p2">' + d.map(function (s, k) {
      return '<article class="c" style="--a:' + A[k % 3] + '">' + img(k, s.n) + '<div class="grad"></div><span class="tag">' + esc(s.t) + '</span><div class="info"><div class="nm">' + esc(s.n) + '</div><div class="ro">' + esc(s.r) + '</div></div></article>';
    }).join("") + "</div>";
  }
  function vp3(d) {
    return '<div class="pt-p3">' + d.map(function (s, k) {
      return '<div class="row" style="--a:' + A[k % 3] + '"><div class="ph">' + img(k, s.n) + '</div><div><div class="nm">' + esc(s.n) + '</div><div class="ro">' + esc(s.r) + '</div></div><div class="right"><div class="tl">' + (s.tl ? "«" + esc(s.tl) + "»" : "") + '</div><span class="tag">' + esc(s.t) + '</span></div></div>';
    }).join("") + "</div>";
  }
  var VAR = { p1: vp1, p2: vp2, p3: vp3 };

  function switcher(v) {
    function chip(id, label) { return '<button class="pt-spk-chip' + (v === id ? " on" : "") + '" data-v="' + id + '">' + label + "</button>"; }
    return '<div class="pt-spk-sw"><span class="lbl">// примерь вариант:</span>' + chip("p1", "1 · Сетка") + chip("p2", "2 · Постеры") + chip("p3", "3 · Строки") + "</div>";
  }

  function renderInto(host) {
    var d = window.__ptSpkData || [];
    var v = window.__ptSpkVariant || "p1";
    if (!VAR[v]) v = "p1";
    host.classList.add("pt-spk-host");
    host.removeAttribute("style");
    host.innerHTML = VAR[v](d); // переключатель убран — залочен вариант 3
  }

  function extract(c) {
    var lv = [].slice.call(c.querySelectorAll("*"))
      .filter(function (e) { return !e.children.length && (e.textContent || "").trim(); })
      .map(function (e) { return e.textContent.trim(); });
    var n = lv[1] || "";
    return { i: lv[0] || "", n: n, r: lv[2] || "", t: lv[3] || "", tl: TOPICS[n] || "" };
  }

  function apply() {
    injectCSS();
    var first = document.querySelector(".scp4");
    if (!first) return;
    var grid = first.parentElement;
    if (!grid) return;
    var cards = [].slice.call(grid.querySelectorAll(".scp4"));
    if (cards.length < 2) return;
    window.__ptSpkData = cards.map(extract);
    renderInto(grid);
    console.log("[speakers] фото-вариант", window.__ptSpkVariant, "·", window.__ptSpkData.length);
  }

  var n = 0, iv = setInterval(function () { n++; apply(); if (n > 200) clearInterval(iv); }, 200);
  apply();
  window.addEventListener("load", apply);
  window.addEventListener("DOMContentLoaded", apply);
  try {
    var mo = new MutationObserver(apply);
    if (document.body) mo.observe(document.body, { childList: true, subtree: true });
    setTimeout(function () { mo.disconnect(); }, 40000);
  } catch (e) {}
})();

</script>

<!-- ===== SCHEDULE ADD-ON ===== -->
<script>
/* ============================================================
   SCHEDULE ADD-ON — секция «Расписание двух дней» → вкладки дней
   + карточки сессий 2-в-ряд с раскрытием описания на hover,
   stagger-влёт, подъём/свечение. Цвет по типу трека.
   Данные берёт из существующих .glass-карточек дней, переживает ре-рендер.
   prefers-reduced-motion → без анимаций.
   ============================================================ */
(function () {
  if (window.__ptSchedule) return;
  window.__ptSchedule = true;
  if (window.__ptSchDay == null) window.__ptSchDay = 0;

  var cy = "#00E5FF", mg = "#FF2E9A", am = "#F0B84B";
  function acc(k) { k = (k || "").toLowerCase(); if (/stream|demo/.test(k)) return am; if (/panel|lounge|showcase|vip/.test(k)) return mg; return cy; }
  var DESC = {
    "Открытие. Манифест Legal AI": "Главный зал · вступительный кейноут о будущем юрпрофессии.",
    "Тренды БФЛ 2026. Дискуссия": "Панель с лидерами практики банкротства физлиц.",
    "Параллельные треки": "6 потоков одновременно — выбираешь свой.",
    "Воркшоп AI-юриста": "Практика с реальными ИИ-инструментами.",
    "Networking · welcome": "Нетворкинг-зона и приветственный бокал.",
    "Утренние мастермайнды": "Малые группы по 8 человек, разбор кейсов.",
    "Кейсы лидеров рынка": "Реальные истории внедрения ИИ в юрфирмах.",
    "Закрытие. AI-демо стенд": "Демонстрация продуктов резидентов.",
    "Закрытая VIP-сессия": "Только для обладателей VIP-билетов."
  };
  var DATA = [];

  var CSS = `
.pt-sch-host{display:block !important;}
.pt-sch-days{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.pt-sch-dtab{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#9aa6b8;background:transparent;border:1px solid #1c2230;border-radius:9px;padding:9px 16px;cursor:pointer;transition:.16s;}
.pt-sch-dtab:hover{border-color:#2c3650;color:#cfe9ff;}
.pt-sch-dtab.on{color:#EEF3FA;border-color:color-mix(in srgb,#00E5FF 45%,#1c2230);background:color-mix(in srgb,#00E5FF 9%,transparent);}
.pt-sch-meta{font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.06em;color:#7d8492;margin:0 0 16px;}
.pt-sch-meta b{color:#aeb6c4;font-weight:400;}
.pt-sch-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:760px){.pt-sch-cards{grid-template-columns:1fr;}}
.pt-sch-c{position:relative;border:1px solid #1c2230;border-radius:14px;padding:16px 18px;background:linear-gradient(160deg,color-mix(in srgb,var(--a) 7%,#0b0d13),#0a0c12);opacity:0;animation:ptSchIn .5s cubic-bezier(.2,.7,.2,1) forwards;animation-delay:calc(var(--i)*60ms);transition:border-color .2s,transform .2s,box-shadow .2s;}
.pt-sch-c:hover{transform:translateY(-3px);border-color:var(--a);box-shadow:0 14px 40px color-mix(in srgb,var(--a) 14%,transparent);}
.pt-sch-c .top{display:flex;align-items:center;gap:12px;}
.pt-sch-c .t{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--a);font-weight:500;font-variant-numeric:tabular-nums;}
.pt-sch-c .k{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--a);border:1px solid color-mix(in srgb,var(--a) 40%,#1c2230);border-radius:5px;padding:3px 8px;}
.pt-sch-c .s{font-family:'Space Grotesk',system-ui,sans-serif;font-weight:600;font-size:16px;color:#EEF3FA;margin-top:11px;line-height:1.2;}
.pt-sch-c .desc{max-height:0;overflow:hidden;opacity:0;transition:max-height .28s ease,opacity .28s ease,margin-top .28s ease;font-size:13px;color:#aab3c2;line-height:1.45;}
.pt-sch-c:hover .desc{max-height:60px;opacity:1;margin-top:9px;}
@keyframes ptSchIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@media(max-width:760px){.pt-sch-c .desc{max-height:60px;opacity:1;margin-top:9px;}}
@media(prefers-reduced-motion:reduce){.pt-sch-c{animation:none !important;opacity:1 !important;}.pt-sch-c .desc,.pt-sch-c{transition:none !important;}}
`;

  function injectCSS() { if (!document.getElementById("pt-sch-style") && document.head) { var s = document.createElement("style"); s.id = "pt-sch-style"; s.textContent = CSS; document.head.appendChild(s); } }
  function esc(t) { return (t || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  function leaves(el) { return [].slice.call(el.querySelectorAll("*")).filter(function (e) { return !e.children.length && (e.textContent || "").trim(); }).map(function (e) { return e.textContent.trim(); }); }
  function cardOf(el) { var n = el; for (var i = 0; i < 9 && n.parentElement; i++) { n = n.parentElement; if (n.classList && n.classList.contains("glass")) return n; } return null; }
  function findDayCards() {
    var marks = [].slice.call(document.querySelectorAll("*")).filter(function (e) { return !e.children.length && /day\s*0[12]/i.test(e.textContent || "") && (e.textContent || "").length < 16; });
    var cards = [];
    marks.forEach(function (m) { var c = cardOf(m); if (c && cards.indexOf(c) < 0) cards.push(c); });
    return cards;
  }
  function extract(card) {
    var lv = leaves(card);
    var items = [];
    for (var i = 3; i + 1 < lv.length; i += 3) items.push({ t: lv[i], s: lv[i + 1], k: lv[i + 2] || "" });
    return { date: lv[1] || "", span: lv[2] || "", items: items };
  }

  function tabs(day) { return '<div class="pt-sch-days">' + DATA.map(function (D, i) { return '<button class="pt-sch-dtab' + (i === day ? " on" : "") + '" data-d="' + i + '">День ' + (i + 1) + "</button>"; }).join("") + "</div>"; }
  function meta(D) { return '<p class="pt-sch-meta"><b>' + esc(D.date) + "</b> · " + esc(D.span) + "</p>"; }
  function cards(D) {
    return '<div class="pt-sch-cards">' + D.items.map(function (x, i) {
      var a = acc(x.k), d = DESC[x.s] || "";
      return '<div class="pt-sch-c" style="--a:' + a + ";--i:" + i + '"><div class="top"><span class="t">' + esc(x.t) + '</span><span class="k">' + esc(x.k) + '</span></div><div class="s">' + esc(x.s) + "</div>" + (d ? '<div class="desc">' + esc(d) + "</div>" : "") + "</div>";
    }).join("") + "</div>";
  }

  function renderInto(host) {
    var day = window.__ptSchDay || 0; if (day >= DATA.length) day = 0;
    host.classList.add("pt-sch-host");
    host.removeAttribute("style");
    host.innerHTML = tabs(day) + meta(DATA[day]) + cards(DATA[day]);
    [].slice.call(host.querySelectorAll(".pt-sch-dtab")).forEach(function (b) {
      b.addEventListener("click", function () { window.__ptSchDay = +b.getAttribute("data-d"); renderInto(host); });
    });
  }

  function apply() {
    injectCSS();
    var dc = findDayCards();
    if (dc.length < 2) return;
    var grid = dc[0].parentElement;
    if (!grid) return;
    DATA = dc.map(extract);
    if (!DATA[0].items.length) return;
    renderInto(grid);
    console.log("[schedule] карточки сессий, дней:", DATA.length);
  }

  var n = 0, iv = setInterval(function () { n++; apply(); if (n > 200) clearInterval(iv); }, 200);
  apply();
  window.addEventListener("load", apply);
  window.addEventListener("DOMContentLoaded", apply);
  try {
    var mo = new MutationObserver(apply);
    if (document.body) mo.observe(document.body, { childList: true, subtree: true });
    setTimeout(function () { mo.disconnect(); }, 40000);
  } catch (e) {}
})();

</script>

<!-- ===== REMOVE-ARTICLES ADD-ON ===== -->
<script>
/* ============================================================
   REMOVE-ARTICLES ADD-ON — полностью убирает пункт «Статьи»:
   таб-кнопку в навигации + ссылку в футере, и перенумеровывает
   «Продукты» 08 → 07, чтобы не оставалось дырки в нумерации.
   Переживает пересборку bundle (interval + observer).
   ============================================================ */
(function () {
  if (window.__ptNoArticles) return;
  window.__ptNoArticles = true;

  function apply() {
    // 1) скрыть таб-кнопку «Статьи»
    [].slice.call(document.querySelectorAll("button")).forEach(function (b) {
      if (/Статьи/.test(b.textContent || "")) {
        if (b.style.display !== "none") b.style.display = "none";
      }
    });
    // 2) перенумеровать «Продукты» 08 → 07
    [].slice.call(document.querySelectorAll("button")).forEach(function (b) {
      if (/Продукты/.test(b.textContent || "")) {
        var num = [].slice.call(b.querySelectorAll("*")).filter(function (e) {
          return !e.children.length && /^0*8$/.test((e.textContent || "").trim());
        })[0];
        if (num && num.textContent.trim() !== "07") num.textContent = "07";
      }
    });
    // 3) скрыть ссылку «Статьи» в футере (и в любых меню-списках)
    [].slice.call(document.querySelectorAll("a")).forEach(function (a) {
      if ((a.textContent || "").trim() === "Статьи" && a.style.display !== "none") a.style.display = "none";
    });
  }

  var n = 0, iv = setInterval(function () { n++; apply(); if (n > 250) clearInterval(iv); }, 200);
  apply();
  window.addEventListener("load", apply);
  window.addEventListener("DOMContentLoaded", apply);
  try {
    var mo = new MutationObserver(apply);
    if (document.body) mo.observe(document.body, { childList: true, subtree: true });
    setTimeout(function () { mo.disconnect(); }, 45000);
  } catch (e) {}
})();

</script>
