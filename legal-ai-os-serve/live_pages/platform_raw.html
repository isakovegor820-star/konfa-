      <noscript><div style="max-width:800px;margin:0 auto;padding:2rem;font-family:system-ui,sans-serif;line-height:1.6"><nav><a href="/">Главная</a> · <a href="/research">Исследования</a> · <a href="/checklists">Чек-листы</a> · <a href="/conference">Конференция</a> · <a href="/platform">Платформа</a> · <a href="/book">Книга</a> · <a href="/academy">Академия</a></nav><main><h1>ТехнологИИ права — исследования, аналитика, конференция</h1>
<p>Платформа об искусственном интеллекте, цифровых технологиях и масштабировании юридического бизнеса в сфере банкротства физических лиц.</p>
<h2>О проекте</h2>
<p>ТехнологИИ права — экосистема для юристов, арбитражных управляющих и руководителей юридических компаний в сфере БФЛ. Мы объединяем исследования рынка, образовательные программы, отраслевую конференцию и цифровые инструменты.</p>
<h2>Что мы делаем</h2>
<ul>
<li><strong>Исследования рынка</strong> — глубокая аналитика рынка БФЛ, трендов автоматизации и внедрения ИИ в юридическую практику</li>
<li><strong>Академия</strong> — онлайн-курсы по банкротству физлиц: юридические аспекты, неосвобождение от обязательств, оспаривание сделок, эффективная команда, продажи юридических услуг</li>
<li><strong>Конференция</strong> — 25–26 сентября 2026, Москва, БЦ «Красные Ворота» (ул. Садовая-Спасская, 21/1). 6 тематических потоков, 80+ спикеров, 1500+ участников</li>
<li><strong>Платформа тренировок</strong> — тренажёр для команды юристов: диалоговые тренировки с AI, экзамены, аналитика прогресса</li>
<li><strong>Книга «Банкротство физических лиц»</strong> — практическое руководство, 117 страниц, безоплатная</li>
</ul>
<h2>Арбитражное управление</h2>
<p>Профессиональное арбитражное управление и сопровождение процедур банкротства физических лиц — от подготовки заявления до завершения дела и списания долгов.</p>
<ol><li>Бесплатная консультация</li><li>Анализ ситуации и документов</li><li>Подача заявления в суд</li><li>Сопровождение процедуры</li><li>Списание долгов</li></ol>
<h2>Исследования</h2><ul><li><a href="/research/bfl-market-2026">Рынок БФЛ в России 2026</a> — Объем рынка, динамика роста, ключевые игроки и прогнозы развития рынка банкротства физических лиц.</li><li><a href="/research/bfl-players">Кто выигрывает рынок БФЛ</a> — Сравнительный анализ юрфирм, партнерских сетей и платформ — кто растет быстрее и почему.</li><li><a href="/research/ai-lawyer">Как ИИ меняет работу юриста по банкротству</a> — Обзор AI-инструментов, кейсы автоматизации и влияние на производительность практики.</li><li><a href="/research/digital-client-journey">Цифровой путь клиента в БФЛ</a> — Как клиенты находят юриста, принимают решение и какие точки контакта можно оцифровать.</li><li><a href="/research/bfl-economics">Экономика юридической практики в БФЛ</a> — Себестоимость дела, маржинальность, unit-экономика и точки оптимизации юридической практики.</li><li><a href="/research/tech-leaders">Какие технологии внедряют лидеры рынка</a> — CRM, AI-ассистенты, автоматизация документов — стек технологий лидеров рынка БФЛ.</li><li><a href="/research/document-automation">Тренды автоматизации документооборота</a> — Генерация процессуальных документов, интеграция с судебными системами, электронная подпись.</li><li><a href="/research/ai-communication">AI-инструменты для коммуникации и продаж</a> — Чат-боты, AI-обзвон, персонализированные воронки — инструменты для привлечения и удержания клиентов.</li><li><a href="/research/bankruptcy-guide-2026">Банкротство физических лиц в 2026 году: пошаговая инструкция</a> — Пошаговое руководство по судебному и внесудебному банкротству: условия, документы, сроки, стоимость.</li><li><a href="/research/judicial-vs-extrajudicial">Судебное или внесудебное банкротство: что выбрать в 2026 году</a> — Сравнение двух процедур: критерии выбора, дерево решений, подводные камни внесудебного банкротства через МФЦ.</li><li><a href="/research/bankruptcy-cost-2026">Сколько стоит банкротство физического лица в 2026 году</a> — Структура расходов: обязательные платежи, услуги юриста, рассрочка. На чём можно и нельзя экономить.</li><li><a href="/research/bankruptcy-consequences">Последствия банкротства физического лица: мифы и реальность</a> — Ограничения во время и после процедуры, мифы про жильё и кредиты, ипотека и залог, жизнь после банкротства.</li><li><a href="/research/how-to-choose-lawyer">Как выбрать юриста по банкротству: 10 критериев и красные флаги</a> — Чек-лист выбора юриста: критерии надёжности, красные флаги, где проверить, какие вопросы задать на встрече.</li><li><a href="/research/creditor-challenging-transactions">Оспаривание сделок при банкротстве: какие сделки под риском</a> — Подозрительные сделки и сделки с предпочтением: сроки оспаривания, презумпции, примеры из практики ВС РФ.</li><li><a href="/research/non-discharge-risks">Неосвобождение от долгов: когда суд откажет в списании</a> — Основания неосвобождения по п. 4 ст. 213.28 127-ФЗ: недобросовестность, ложные сведения, мошеннические кредиты, практика.</li><li><a href="/research/scaling-bfl-practice">Масштабирование юридической практики в БФЛ: от 10 до 100+ дел в месяц</a> — Четыре рычага роста: процессы, команда, технологии, поток. Экономика масштабирования и типичные ошибки.</li><li><a href="/research/vs-rf-practice-2026">Судебная практика ВС РФ по БФЛ: ключевые позиции 2024-2026</a> — Систематизированный анализ позиций Верховного Суда по банкротству граждан: топ-20 позиций, неосвобождение, оспаривание сделок, единственное жильё, субсидиарка. Чек-лист 30 формулировок для каждого дела.</li><li><a href="/research/housing-protection-bfl">Единственное жильё в банкротстве: стратегии защиты и атаки</a> — Полный разбор исполнительского иммунитета: критерии роскошного жилья по практике 100+ дел, замещающее жильё, ипотека, совместная собственность. Алгоритм-дерево решений.</li><li><a href="/research/client-acquisition-bfl">Привлечение клиентов в практику БФЛ: каналы, конверсии, юнит-экономика</a> — Готовая маркетинговая стратегия с цифрами. ротство молодеет и феминизируется — и это меняет требования к продукту и маркетингу практики.</li><li><a href="/research/creditor-side-bfl-2026">Банкротство глазами кредитора: списания, цессия, пассивность взыскателей</a> — Почему кредиторы инициируют лишь 2% дел и предпочитают продавать долги коллекторам. Как мотивация банка определяет, будет ли дело «тихим» или конфликтным.</li><li><a href="/research/rehab-vs-liquidation-2026">Реструктуризация vs реализация: почему реабилитация не работает</a> — Реализацию вводят кратно чаще реструктуризации, а 94% проходят процедуру без продажи имущества. БФЛ де-факто стало чистым списанием долгов.</li></ul>
